name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-package:
    name: Test NautilarrKit
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode (Liquid Glass needs the iOS/macOS 26 SDK)
        run: |
          # Prefer the known-good Xcode 26.3.0. A newer Xcode_26.3.app on the
          # runner turns swift-nio-ssh's umbrella `import NIO` from a warning into
          # a hard error under explicit modules. Fall back to 26.2, then any 26.x.
          XCODE=""
          for c in /Applications/Xcode_26.3.0.app /Applications/Xcode_26.2*.app; do
            [ -d "$c" ] && XCODE="$c" && break
          done
          if [ -z "$XCODE" ]; then XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1); fi
          if [ -z "$XCODE" ]; then XCODE=/Applications/Xcode.app; fi
          echo "Selecting $XCODE"
          sudo xcode-select -switch "$XCODE"
          xcodebuild -version
      - name: Run unit tests
        working-directory: Packages/NautilarrKit
        run: swift test --parallel

  build-app:
    name: Build app (Catalyst + iOS)
    runs-on: macos-latest
    needs: test-package
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode (Liquid Glass needs the iOS/macOS 26 SDK)
        run: |
          # Prefer the known-good Xcode 26.3.0. A newer Xcode_26.3.app on the
          # runner turns swift-nio-ssh's umbrella `import NIO` from a warning into
          # a hard error under explicit modules. Fall back to 26.2, then any 26.x.
          XCODE=""
          for c in /Applications/Xcode_26.3.0.app /Applications/Xcode_26.2*.app; do
            [ -d "$c" ] && XCODE="$c" && break
          done
          if [ -z "$XCODE" ]; then XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1); fi
          if [ -z "$XCODE" ]; then XCODE=/Applications/Xcode.app; fi
          echo "Selecting $XCODE"
          sudo xcode-select -switch "$XCODE"
          xcodebuild -version
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      # SWIFT_ENABLE_EXPLICIT_MODULES=NO must be passed on the xcodebuild command
      # line (not just in project.yml): a project-level build setting does NOT
      # cascade into SwiftPM dependency targets, so swift-nio-ssh was still built
      # with explicit modules and failed with "Unable to find module dependency:
      # 'NIO'" (its umbrella `import NIO`). A command-line override applies to
      # every target in the build graph, including package checkouts, which is the
      # only place that reliably reaches swift-nio-ssh.
      - name: Build (Mac Catalyst)
        run: |
          xcodebuild -project Nautilarr.xcodeproj -scheme Nautilarr \
            -destination 'platform=macOS,variant=Mac Catalyst' \
            SWIFT_ENABLE_EXPLICIT_MODULES=NO \
            CODE_SIGNING_ALLOWED=NO build
      - name: Build (iOS Simulator)
        run: |
          xcodebuild -project Nautilarr.xcodeproj -scheme Nautilarr \
            -destination 'generic/platform=iOS Simulator' \
            SWIFT_ENABLE_EXPLICIT_MODULES=NO \
            CODE_SIGNING_ALLOWED=NO build
