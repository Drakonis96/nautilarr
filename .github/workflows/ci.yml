name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-package:
    name: Test NautilarrKit
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode (Liquid Glass needs the iOS/macOS 26 SDK)
        run: |
          # Prefer the known-good Xcode 26.3.0. A newer Xcode_26.3.app on the
          # runner turns swift-nio-ssh's umbrella `import NIO` from a warning into
          # a hard error under explicit modules. Fall back to 26.2, then any 26.x.
          XCODE=""
          for c in /Applications/Xcode_26.3.0.app /Applications/Xcode_26.2*.app; do
            [ -d "$c" ] && XCODE="$c" && break
          done
          if [ -z "$XCODE" ]; then XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1); fi
          if [ -z "$XCODE" ]; then XCODE=/Applications/Xcode.app; fi
          echo "Selecting $XCODE"
          sudo xcode-select -switch "$XCODE"
          xcodebuild -version
      - name: Run unit tests
        working-directory: Packages/NautilarrKit
        run: swift test --parallel

  build-app:
    name: Build app (Catalyst + iOS)
    runs-on: macos-latest
    needs: test-package
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode (Liquid Glass needs the iOS/macOS 26 SDK)
        run: |
          # Prefer the known-good Xcode 26.3.0. A newer Xcode_26.3.app on the
          # runner turns swift-nio-ssh's umbrella `import NIO` from a warning into
          # a hard error under explicit modules. Fall back to 26.2, then any 26.x.
          XCODE=""
          for c in /Applications/Xcode_26.3.0.app /Applications/Xcode_26.2*.app; do
            [ -d "$c" ] && XCODE="$c" && break
          done
          if [ -z "$XCODE" ]; then XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1); fi
          if [ -z "$XCODE" ]; then XCODE=/Applications/Xcode.app; fi
          echo "Selecting $XCODE"
          sudo xcode-select -switch "$XCODE"
          xcodebuild -version
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      # Build in the Release configuration — the same one the release workflow's
      # package scripts use and that builds green on this exact runner + Xcode.
      # The Debug default sets ENABLE_TESTABILITY=YES (-enable-testing), which
      # under Xcode 26's explicit modules breaks resolution of swift-nio-ssh's
      # umbrella `import NIO` ("no such module 'NIO'"). SWIFT_ENABLE_EXPLICIT_MODULES=NO
      # does NOT help — explicit modules stay on regardless — so match the proven
      # Release build instead of fighting the module system. See package_mac.sh.
      - name: Build (Mac Catalyst)
        run: |
          xcodebuild -project Nautilarr.xcodeproj -scheme Nautilarr \
            -configuration Release \
            -destination 'platform=macOS,variant=Mac Catalyst' \
            -derivedDataPath build/ci-mac \
            CODE_SIGNING_ALLOWED=NO build
      - name: Build (iOS Simulator)
        run: |
          xcodebuild -project Nautilarr.xcodeproj -scheme Nautilarr \
            -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build/ci-ios \
            CODE_SIGNING_ALLOWED=NO build
