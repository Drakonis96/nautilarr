name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-package:
    name: Test NautilarrKit
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode (Liquid Glass needs the iOS/macOS 26 SDK)
        run: |
          XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE" ]; then XCODE=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1); fi
          if [ -z "$XCODE" ]; then XCODE=/Applications/Xcode.app; fi
          echo "Selecting $XCODE"
          sudo xcode-select -switch "$XCODE"
          xcodebuild -version
      - name: Run unit tests
        working-directory: Packages/NautilarrKit
        run: swift test --parallel

  build-app:
    name: Build app (Catalyst + iOS)
    runs-on: macos-latest
    needs: test-package
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode (Liquid Glass needs the iOS/macOS 26 SDK)
        run: |
          XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE" ]; then XCODE=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1); fi
          if [ -z "$XCODE" ]; then XCODE=/Applications/Xcode.app; fi
          echo "Selecting $XCODE"
          sudo xcode-select -switch "$XCODE"
          xcodebuild -version
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      - name: Build (Mac Catalyst)
        run: |
          xcodebuild -project Nautilarr.xcodeproj -scheme Nautilarr \
            -destination 'platform=macOS,variant=Mac Catalyst' \
            CODE_SIGNING_ALLOWED=NO build
      - name: Build (iOS Simulator)
        run: |
          xcodebuild -project Nautilarr.xcodeproj -scheme Nautilarr \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO build
