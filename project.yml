# XcodeGen project definition. Generate the Xcode project with:
#   xcodegen generate
# A single SwiftUI app target builds for iOS, iPadOS and Mac (via Mac Catalyst),
# linking the local NautilarrKit Swift package for all networking/service logic.
name: Nautilarr
options:
  bundleIdPrefix: com.drakonis96
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
  developmentLanguage: en

settings:
  base:
    MARKETING_VERSION: "0.1.5"
    CURRENT_PROJECT_VERSION: "6"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    # No paid entitlements are used anywhere in this project.

packages:
  NautilarrKit:
    path: Packages/NautilarrKit

targets:
  Nautilarr:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App/Sources
      - path: App/Resources
    dependencies:
      - package: NautilarrKit
        product: NautilarrCore
      - package: NautilarrKit
        product: SonarrKit
      - package: NautilarrKit
        product: RadarrKit
      - package: NautilarrKit
        product: LidarrKit
      - package: NautilarrKit
        product: QBittorrentKit
      - package: NautilarrKit
        product: SABnzbdKit
      - package: NautilarrKit
        product: OverseerrKit
      - package: NautilarrKit
        product: NZBGetKit
      - package: NautilarrKit
        product: TransmissionKit
      - package: NautilarrKit
        product: DelugeKit
      - package: NautilarrKit
        product: TautulliKit
      - package: NautilarrKit
        product: ProwlarrKit
      - package: NautilarrKit
        product: BazarrKit
      - package: NautilarrKit
        product: SSHKit
      - package: NautilarrKit
        product: JellystatKit
      - package: NautilarrKit
        product: UnraidKit
      - package: NautilarrKit
        product: TorznabKit
    info:
      path: App/Resources/Info.plist
      properties:
        CFBundleDisplayName: Nautilarr
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDevelopmentRegion: en
        CFBundleLocalizations:
          - en
          - es
          - fr
          - de
        LSRequiresIPhoneOS: true
        # Self-hosted servers are often plain HTTP on a LAN, reached by IP or
        # with self-signed TLS. Arbitrary loads are allowed so users can connect
        # to any private endpoint; self-signed trust is still opt-in per instance
        # and scoped to that instance's hosts in the networking layer.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSAllowsLocalNetworking: true
        NSLocalNetworkUsageDescription: "Nautilarr connects to your self-hosted services on your local network."
        NSFaceIDUsageDescription: "Nautilarr uses Face ID to protect SSH access and settings."
        # Local notifications + background polling only — no remote push. Only
        # the BGAppRefreshTask ("fetch") is actually used; the unused "processing"
        # mode was dropped so the app declares no capability it doesn't use.
        UIBackgroundModes:
          - fetch
        BGTaskSchedulerPermittedIdentifiers:
          - com.drakonis96.nautilarr.refresh
        UILaunchScreen:
          UIColorName: BrandNavy
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.drakonis96.nautilarr
        PRODUCT_NAME: Nautilarr
        INFOPLIST_KEY_UILaunchScreen_Generation: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Alternate app icons the user can switch to in-app (setAlternateIconName).
        # The primary AppIcon also carries a dark-appearance variant for automatic
        # system light/dark switching.
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
        ASSETCATALOG_COMPILER_ALTERNATE_APPICON_NAMES: AppIcon-Ocean AppIcon-Midnight
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        # Mac Catalyst — reuse the iPad codebase on macOS.
        SUPPORTS_MACCATALYST: YES
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: NO
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        # Allow building/running without a paid signing identity.
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGNING_ALLOWED: YES
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
